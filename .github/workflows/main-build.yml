name: GitHub action build
on: push

jobs:
  main-build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: GIT checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Run build script
      working-directory: scripts
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          ./dotnet_build.sh code_coverage
        else
          ./dotnet_build.sh
         fi

         - name: Upload test coverage to Coveralls
         uses: coverallsapp/github-action@v2
         with:
           format: lcov
           files: coverage.net8.info coverage.net48.info
   
    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      if: runner.os == 'Linux'
      with:
        name: NuGet packages
        path: release\Fastenshtein.*.*upkg

    - name: Upload code coverage
      uses: actions/upload-artifact@v4
      if: runner.os == 'Linux'
      with:
        name: code coverage
        path: release/coverage.*.info

    - name: Upload dotnet info
      uses: actions/upload-artifact@v4
      if: runner.os == 'Linux'
      with:
        path: release/dotnet_info.txt
